<!DOCTYPE html>
<html>
<head>
<title>AI Academic & Placement Assistant</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;

    background-image: url("https://img.freepik.com/premium-photo/vibrant-college-campus-with-students-walking_1126694-13107.jpg?w=996");
    background-size: cover;
    background-position: center;
}

/* MAIN FORM BOX */

.container{
    width:420px;
    padding:35px;
    margin:100px auto;

    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(6px);

    border-radius:12px;
    box-shadow:0px 8px 25px rgba(0,0,0,0.3);
}

/* TITLE */

h2{
    text-align:center;
    color:#222;
}

/* LABELS */

label{
    font-weight:bold;
}

/* INPUT FIELDS */

input{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:15px;

    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2>AI Academic Predictor</h2>

<form action="/predict" method="post">

<!-- NEW FIELDS -->

<label>Name</label>
<input type="text" name="name" placeholder="Enter your name" required>

<label>Department</label>
<input type="text" name="department" placeholder="Enter your department" required>

<!-- EXISTING FIELDS -->

<label>Attendance %</label>
<input type="number" name="attendance" required>

<label>CGPA</label>
<input type="number" step="0.1" name="cgpa" required>

<label>Current GPA</label>
<input type="number" step="0.1" name="gpa" required>

<label>Internal Marks</label>
<input type="number" name="internal" required>

<button type="submit">Predict Result</button>

</form>

</div>

</body>
</html>
